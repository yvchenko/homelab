services:
  api:
    container_name: LibreChat
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      - mongodb
      - rag_api
    image: yvchenko/librechat-custom-tagging:latest
    restart: always
    user: "${UID}:${GID}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HOST=0.0.0.0
      - MONGO_URI=mongodb://mongodb:27017/LibreChat
      - MEILI_HOST=http://meilisearch:7700
      - RAG_PORT=${RAG_PORT:-8000}
      - RAG_API_URL=http://rag_api:${RAG_PORT:-8000}
    volumes:
      - type: bind
        source: /opt/appdata/librechat/.env
        target: /app/.env
      - type: bind
        source: /opt/appdata/librechat/librechat.yaml
        target: /app/librechat.yaml
      - /opt/appdata/librechat/images:/app/client/public/images
      - /opt/appdata/librechat/uploads:/app/uploads
      - /opt/appdata/librechat/logs:/app/logs
    env_file:
      - /opt/appdata/librechat/.env

  mongodb:
    container_name: chat-mongodb
    image: mongo:8.0.20
    restart: always
    user: "${UID}:${GID}"
    volumes:
      - /opt/appdata/librechat/db:/data/db
    command: mongod --noauth
    env_file:
      - /opt/appdata/librechat/.env

  meilisearch:
    container_name: chat-meilisearch
    image: getmeili/meilisearch:v1.35.1
    restart: always
    user: "${UID}:${GID}"
    environment:
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_NO_ANALYTICS=true
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
    volumes:
      - /opt/appdata/librechat/meili_data:/meili_data
    env_file:
      - /opt/appdata/librechat/.env

  vectordb:
    container_name: vectordb
    image: pgvector/pgvector:0.8.0-pg15-trixie
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    restart: always
    volumes:
      - /opt/appdata/librechat/pgdata:/var/lib/postgresql/data

  rag_api:
    container_name: rag_api
    image: registry.librechat.ai/danny-avila/librechat-rag-api-dev-lite:latest
    environment:
      - DB_HOST=vectordb
      - RAG_PORT=${RAG_PORT:-8000}
    restart: always
    depends_on:
      - vectordb
    env_file:
      - /opt/appdata/librechat/.env
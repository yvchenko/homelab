version: 1.3.5

cache: true

interface:
  agents: false
  bookmarks: true

endpoints:
  ollama:
    baseURL: "http://host.docker.internal:11434/v1/"
    models:
      default: ["dolphin-mistral-24b-venice-edition:Q3_K_M"]
      fetch: true

  custom:
    - name: "Routeway"
      apiKey: "${ROUTEWAY_API_KEY}"
      baseURL: "https://api.routeway.ai/v1"
      models:
        default: [
          "kimi-k2-0905:free",
          "glm-4.5-air:free",
          "gpt-oss-120b:free",
          "step-3.5-flash:free",
          "mistral-nemo-instruct:free",
          "devstral-2512:free"
          ]
        fetch: true
      titleConvo: true
      titleModel: "current_model"

    - name: 'OpenRouter'
      apiKey: '${OPENROUTER_KEY}'
      baseURL: 'https://openrouter.ai/api/v1'
      models:
        default: [
          "meta-llama/llama-3.3-70b-instruct:free",
        ]
        fetch: true
      titleConvo: true
      titleModel: 'current_model'
      dropParams: ['stop']
      modelDisplayLabel: 'OpenRouter'

    - name: "Moonshot AI"
      apiKey: "${MOONSHOT_API_KEY}"
      baseURL: "https://api.moonshot.ai/v1"
      models:
        default: [
          "kimi-k2.5"
        ]
        fetch: true
      titleConvo: true
      titleModel: "current_model"

    - name: "DeepSeek"
      apiKey: "${DEEPSEEK_API_KEY}"
      baseURL: "https://api.deepseek.com/v1"
      models:
        default: [
          "deepseek-v4-flash",
        ]
        fetch: true
      titleConvo: true
      titleModel: "current_model"


version: 1.3.5

cache: true

interface:
  agents: false
  bookmarks: true

endpoints:
  custom:
    - name: "Routeway"
      apiKey: "user_provided"
      baseURL: "https://api.routeway.ai/v1"
      models:
        default: [
          "step-3.5-flash:free"
          ]
        fetch: true
      titleConvo: true
      titleModel: "current_model"

    - name: 'OpenRouter'
      apiKey: 'user_provided'
      baseURL: 'https://openrouter.ai/api/v1'
      models:
        default: [
          "openrouter/free"
        ]
        fetch: true
      titleConvo: true
      titleModel: 'current_model'
      dropParams: ['stop']
      modelDisplayLabel: 'OpenRouter'

    - name: "Moonshot AI"
      apiKey: "user_provided"
      baseURL: "https://api.moonshot.ai/v1"
      models:
        default: [
          "kimi-k2.5"
        ]
        fetch: true
      titleConvo: true
      titleModel: "current_model"

    - name: "DeepSeek"
      apiKey: "user_provided"
      baseURL: "https://api.deepseek.com/v1"
      models:
        default: [
          "deepseek-v4-flash",
          "deepseek-v4-pro"
        ]
        fetch: true
      titleConvo: true
      titleModel: "current_model"

    - name: "Venice"
      apiKey: "user_provided"
      baseURL: "https://api.venice.ai/api/v1"
      models:
        default: [
          "venice-uncensored-1-2",
          "venice-uncensored-role-play"
        ]
        fetch: true


